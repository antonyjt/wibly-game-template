name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: hashFiles('pnpm-lock.yaml') != ''

      - run: pnpm install
        if: hashFiles('pnpm-lock.yaml') == ''

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
